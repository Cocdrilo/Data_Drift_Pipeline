global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']

  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']

# 1. Le decimos dónde están las reglas
rule_files:
  - "alert.rules.yml"

# 2. Le decimos a quién avisar cuando se rompa una regla
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']