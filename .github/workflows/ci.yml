name: CI Pipeline

# 1. ¿Cuándo se ejecuta? Cada vez que subas código a la rama principal o hagas un PR.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # 2. ¿Qué trabajo va a hacer? Pasar los tests.
  test-and-lint:
    runs-on: ubuntu-latest # Levanta un Linux limpio en los servidores de GitHub

    steps:
    # 3. Descarga tu código en esa máquina
    - name: Checkout code
      uses: actions/checkout@v4

    # 4. Instala Python 3.10 (la misma versión que tu Docker)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Guarda las librerías en caché para que las siguientes veces vaya más rápido

    # 5. Instala las dependencias y Pytest
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    # 6. Ejecuta tu suite de tests con reporte de cobertura
    - name: Run test suite
      run: |
        pytest tests/ --cov=src --cov-report=term