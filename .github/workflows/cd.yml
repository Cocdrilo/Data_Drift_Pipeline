name: CD Pipeline (Docker Build & Push)

on:
  push:
    branches: [ "main", "master" ]

# 1. Silenciamos el warning forzando el uso del motor moderno (Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. Convertimos el nombre de usuario a minúsculas para cumplir la regla de Docker
    - name: Convert owner to lowercase
      run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        push: true
        # 3. Usamos la nueva variable en minúsculas (env.REPO_OWNER)
        tags: ghcr.io/${{ env.REPO_OWNER }}/data-drift-api:latest

    - name: Build and push Monitor image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.monitor
        push: true
        tags: ghcr.io/${{ env.REPO_OWNER }}/data-drift-monitor:latest