name: CD Pipeline (Docker Build & Push)

# 1. ¿Cuándo se ejecuta? Solo cuando el código llega a la rama 'main'
# (No queremos subir imágenes a producción si es solo un Pull Request de prueba)
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # 2. Damos permisos a la máquina para escribir en tu registro de paquetes
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 3. Iniciamos sesión en GHCR (GitHub Container Registry)
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 4. Construimos y subimos la imagen de la API
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        push: true
        # Se guardará como: ghcr.io/tu-usuario/data-drift-api:latest
        tags: ghcr.io/${{ github.repository_owner }}/data-drift-api:latest

    # 5. Construimos y subimos la imagen del Monitor
    - name: Build and push Monitor image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.monitor
        push: true
        # Se guardará como: ghcr.io/tu-usuario/data-drift-monitor:latest
        tags: ghcr.io/${{ github.repository_owner }}/data-drift-monitor:latest